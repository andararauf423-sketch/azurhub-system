<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AzurHub Order AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md bg-gray-900 p-8 rounded-2xl border border-blue-600 shadow-2xl">
        <h2 class="text-3xl font-extrabold mb-6 text-center text-blue-400">Order System</h2>
        
        <div class="space-y-5">
            <input id="nama" type="text" placeholder="Nama Anda" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 focus:outline-none focus:border-blue-500">
            <textarea id="request" placeholder="Detail Website (Contoh: Web Portfolio Dark Mode)" class="w-full bg-gray-800 p-4 rounded-xl border border-gray-700 h-32 focus:outline-none focus:border-blue-500"></textarea>
            <button onclick="kirimOrder()" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold text-lg transition duration-300 transform hover:scale-105">KIRIM PESANAN</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG FIREBASE LO (Gue pake data yang tadi lo kasih)
        const firebaseConfig = {
            apiKey: "AIzaSyCgn6BJJ8H4_JrudtgK__H1NNtV-eIAoO8",
            authDomain: "azurhub-system.firebaseapp.com",
            projectId: "azurhub-system",
            storageBucket: "azurhub-system.firebasestorage.app",
            messagingSenderId: "897658533775",
            appId: "1:897658533775:web:17b04bcd1c068c33757dfa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.kirimOrder = async () => {
            const nama = document.getElementById('nama').value;
            const req = document.getElementById('request').value;

            if(!nama || !req) return alert("Isi dulu, Taik!");

            try {
                await addDoc(collection(db, "orders"), {
                    nama_user: nama,
                    request: req,
                    status: "pending",
                    createdAt: serverTimestamp()
                });
                alert("Sip! Pesanan Masuk.");
                location.reload();
            } catch (e) {
                alert("Gagal: " + e.message);
            }
        }
    </script>
</body>
</html>
